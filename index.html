<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flight Delay Prediction</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #12181f;
    --amber: #f5b400;
    --amber-dim: #7a5a00;
    --off-white: #e8e6df;
    --red: #d9534f;
    --green: #3fa66b;
    --rule: #263140;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--off-white);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }

  .board-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .board-header .eyebrow {
    letter-spacing: 4px;
    font-size: 12px;
    color: var(--amber);
    text-transform: uppercase;
  }

  .board-header h1 {
    font-size: 28px;
    letter-spacing: 2px;
    margin: 6px 0 0;
    color: var(--off-white);
    font-weight: 700;
  }

  form {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 24px;
    width: 100%;
    max-width: 640px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  form .full { grid-column: 1 / -1; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--amber-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    background: #0e1319;
    border: 1px solid var(--rule);
    color: var(--off-white);
    font-family: inherit;
    font-size: 15px;
    padding: 10px 10px;
    border-radius: 2px;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--amber);
  }

  button {
    grid-column: 1 / -1;
    background: var(--amber);
    color: #14100a;
    border: none;
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 14px;
    padding: 14px;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 4px;
  }

  button:hover { background: #ffc82e; }
  button:disabled { background: var(--amber-dim); cursor: not-allowed; }

  .result {
    margin-top: 28px;
    width: 100%;
    max-width: 640px;
    display: none;
  }

  .flap-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 18px;
  }

  .flap {
    background: #14181d;
    border: 1px solid var(--rule);
    border-radius: 3px;
    width: 54px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    color: var(--amber);
    position: relative;
    overflow: hidden;
  }

  .flap::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #000;
    opacity: 0.6;
  }

  .flap.flipping {
    animation: flip 0.35s ease-in-out;
  }

  @keyframes flip {
    0% { transform: rotateX(0deg); }
    50% { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }

  .status-line {
    text-align: center;
    font-size: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 14px;
    border-radius: 3px;
  }

  .status-line.delayed {
    background: rgba(217, 83, 79, 0.12);
    color: var(--red);
    border: 1px solid var(--red);
  }

  .status-line.ontime {
    background: rgba(63, 166, 107, 0.12);
    color: var(--green);
    border: 1px solid var(--green);
  }

  .error-box {
    margin-top: 20px;
    background: rgba(217, 83, 79, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 14px;
    border-radius: 3px;
    max-width: 640px;
    width: 100%;
    display: none;
    font-size: 13px;
  }

  .api-note {
    margin-top: 24px;
    font-size: 11px;
    color: #52606d;
    text-align: center;
    max-width: 640px;
  }
</style>
</head>
<body>

  <div class="board-header">
    <div class="eyebrow">Departure Risk Board</div>
    <h1>FLIGHT DELAY PREDICTION</h1>
  </div>

  <form id="predict-form">
    <div>
      <label for="fl_date">Flight Date</label>
      <input type="date" id="fl_date" required>
    </div>
    <div>
      <label for="airline">Airline</label>
      <input type="text" id="airline" placeholder="Southwest Airlines Co." required>
    </div>
    <div>
      <label for="origin">Origin (IATA)</label>
      <input type="text" id="origin" placeholder="ORD" maxlength="3" required style="text-transform:uppercase">
    </div>
    <div>
      <label for="dest">Destination (IATA)</label>
      <input type="text" id="dest" placeholder="LAX" maxlength="3" required style="text-transform:uppercase">
    </div>
    <div>
      <label for="dep_time">Scheduled Departure (HHMM)</label>
      <input type="text" id="dep_time" placeholder="1830" required>
    </div>
    <div>
      <label for="arr_time">Scheduled Arrival (HHMM)</label>
      <input type="text" id="arr_time" placeholder="2045" required>
    </div>
    <div>
      <label for="elapsed">Scheduled Duration (min)</label>
      <input type="number" id="elapsed" placeholder="255" required>
    </div>
    <div>
      <label for="distance">Distance (miles)</label>
      <input type="number" id="distance" placeholder="1745" required>
    </div>

    <button type="submit" id="submit-btn" class="full">Check Flight</button>
  </form>

  <div class="result" id="result">
    <div class="flap-row" id="flap-row"></div>
    <div class="status-line" id="status-line"></div>
  </div>

  <div class="error-box" id="error-box"></div>

  <p class="api-note">Calls your local FastAPI server at <code>http://localhost:8000/predict</code>. Make sure it's running (<code>uvicorn src.api.main:app --reload</code> or via Docker) before checking a flight.</p>

<script>
const API_URL = "http://localhost:8000/predict";

const form = document.getElementById("predict-form");
const submitBtn = document.getElementById("submit-btn");
const resultEl = document.getElementById("result");
const flapRow = document.getElementById("flap-row");
const statusLine = document.getElementById("status-line");
const errorBox = document.getElementById("error-box");

function renderFlaps(percent) {
  flapRow.innerHTML = "";
  const digits = String(percent).padStart(3, "0").split("");
  digits.forEach((d, i) => {
    const flap = document.createElement("div");
    flap.className = "flap flipping";
    flap.textContent = d;
    flapRow.appendChild(flap);
  });
  const pct = document.createElement("div");
  pct.className = "flap flipping";
  pct.style.width = "40px";
  pct.style.fontSize = "28px";
  pct.textContent = "%";
  flapRow.appendChild(pct);
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.style.display = "none";
  resultEl.style.display = "none";
  submitBtn.disabled = true;
  submitBtn.textContent = "Checking...";

  const payload = {
    FL_DATE: document.getElementById("fl_date").value,
    AIRLINE: document.getElementById("airline").value,
    ORIGIN: document.getElementById("origin").value.toUpperCase(),
    DEST: document.getElementById("dest").value.toUpperCase(),
    CRS_DEP_TIME: parseInt(document.getElementById("dep_time").value, 10),
    CRS_ARR_TIME: parseInt(document.getElementById("arr_time").value, 10),
    CRS_ELAPSED_TIME: parseFloat(document.getElementById("elapsed").value),
    DISTANCE: parseFloat(document.getElementById("distance").value),
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(errBody.detail || `Request failed with status ${res.status}`);
    }

    const data = await res.json();
    const percent = Math.round(data.delay_probability * 100);

    renderFlaps(percent);
    statusLine.textContent = data.predicted_delayed ? "Likely Delayed" : "Likely On Time";
    statusLine.className = "status-line " + (data.predicted_delayed ? "delayed" : "ontime");
    resultEl.style.display = "block";
  } catch (err) {
    errorBox.textContent = "Couldn't get a prediction: " + err.message +
      " — is the API running at localhost:8000?";
    errorBox.style.display = "block";
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Check Flight";
  }
});
</script>

</body>
</html>
